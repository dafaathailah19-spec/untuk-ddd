<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Sayang ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at top,#ffe4ec,#ffb6c1);
  font-family:sans-serif;
  text-align:center;
}

h1{
  margin-top:60px;
  color:#ff4d6d;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

/* love */
.love{
  position:absolute;
  animation:up 5s linear infinite;
}
@keyframes up{
  from{transform:translateY(100vh);}
  to{transform:translateY(-100px);}
}
</style>
</head>

<body>

<h1 id="text">alow Sayangku ❤️</h1>
<button onclick="start()">Klik Aku 💖</button>

<canvas id="c"></canvas>

<script>
function start(){

  document.querySelector("button").style.display="none";
  document.getElementById("text").innerHTML="Liat yaa sayangku... ❤️";

  const canvas=document.getElementById("c");
  const ctx=canvas.getContext("2d");

  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  // bikin teks invisible
  ctx.fillStyle="white";
  ctx.font="70px Arial";
  ctx.textAlign="center";
  ctx.fillText("ALOW CANTIKU", canvas.width/2, canvas.height/2);

  // ambil pixel
  const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

  let points=[];

  for(let y=0;y<canvas.height;y+=6){
    for(let x=0;x<canvas.width;x+=6){
      let i=(y*canvas.width+x)*4;
      if(data[i+3]>128){
        points.push({x,y});
      }
    }
  }

  // bersihkan canvas
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let candis=[];

  // buat candi
  for(let i=0;i<points.length;i++){
    candis.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      tx:points[i].x,
      ty:points[i].y
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    candis.forEach(c=>{
      // gerak halus ke target
      c.x += (c.tx - c.x)*0.05;
      c.y += (c.ty - c.y)*0.05;

      ctx.font="16px serif";
      ctx.fillText("🏛️",c.x,c.y);
    });

    requestAnimationFrame(draw);
  }

  draw();

  // love effect
  setInterval(()=>{
    let l=document.createElement("div");
    l.className="love";
    l.innerHTML="❤️";
    l.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),5000);
  },250);
}
</script>

</body>
</html>
